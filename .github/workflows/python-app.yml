# This workflow runs basic checks to ensure the code runs on push or pull request
# Purpose: GitHub Actions CI for Python code
name: Python application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt || true
    - name: Run basic test
      run: |
        echo "No tests yet, but this ensures the code runs."
